---
- name: Create selenoid root folder
  file:
    path: /root/selenoid
    state: directory
    mode: '0755'
  tags: selenoid_config

- name: Create browsers.json for selenoid
  template:
    src: browsers.json.j2
    dest: /root/selenoid/browsers.json
  vars:
    chrome_version1: 128.0
    chrome_version2: 127.0
  tags: selenoid_config

- name: Pull docker images with browser
  community.docker.docker_image_pull:
    name: "selenoid/{{ item }}"
    pull: "not_present"
  loop:
    - chrome:128.0
    - chrome:127.0
  tags: selenoid_config

- name: Create docker networks
  community.docker.docker_network:
    name: "{{ item }}"
  loop:
    - selenoid1
    - selenoid2

- name: Create docker-compose.yml for selenoid
  template:
    src: docker-compose.yml.j2
    dest: /root/selenoid/docker-compose.yaml
  vars:
    network1: selenoid1
    network2: selenoid2
    selenoid_path: /root/selenoid/

- name: Create grid-router folder
  file:
    path: /root/selenoid/grid-router/quota
    state: directory
  tags: selenoid_config

- name: Create quota file for ggr
  template:
    src: test.xml.j2
    dest: /root/selenoid/grid-router/quota/test.xml
  vars:
    browser_version1: 128.0
    browser_version2: 127.0
  tags: selenoid_config

- name: Create selenoid.conf for nginx
  template:
    src: selenoid.conf.j2
    dest: /root/selenoid/selenoid.conf
  tags: selenoid_config

- name: Running selenoid via docker-compose orchestration
  community.docker.docker_compose_v2:
    project_src: /root/selenoid
    state: present
