name: selenoid-stack

services:
  jenkins:
    build:
      context: .
      dockerfile: slaves/Dockerfile.maven
    restart: always
    hostname: jenkins
    user: root
    environment:
      - JAVA_OPTS=-Dhudson.model.DownloadService.noSignatureCheck=true
      - DOCKER_HOST=unix:///var/run/docker.sock
      - JENKINS_OPTS=--prefix=/my_jenkins
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  registry:
    image: registry:3.0.0
    restart: always
    container_name: registry
    hostname: registry
    volumes:
      - ./registry:/var/lib/registry
    ports:
      - "5005:5005"
    environment:
      - REGISTRY_HTTP_ADDR=0.0.0.0:5005

  nginx:
    image: nginx
    privileged: true
    restart: always
    container_name: nginx
    hostname: nginx
    depends_on:
      - jenkins
      - registry
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "80:80"

  selenoid:
    image: aerokube/selenoid:latest-release
    container_name: selenoid
    restart: always
    ports:
      - "4444:4444"
    volumes:
      - ./selenoid:/etc/selenoid:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - "-conf"
      - "/etc/selenoid/browsers.json"
      - "-container-network"
      - "selenoid-stack_default"